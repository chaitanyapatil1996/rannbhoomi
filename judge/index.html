<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Judge Portal — RANNBHOOMI 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../images/logo-crimson.png">
<style>
:root {
  --crimson: #4c0007;
  --gold: #dec189;
  --parchment: #d6b97a;
  --border: rgba(76,0,7,0.22);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: #d6b97a; font-family: 'Cinzel', serif; color: var(--crimson); }
body { padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0); }

/* ── Layout ── */
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px 40px; }
.screen.active { display: flex; }

/* ── PIN screen ── */
.pin-card { width: 100%; max-width: 400px; background: rgba(214,185,122,0.55); border: 1px solid var(--border); padding: 40px 32px; }
.assignment-badge { font-size: 9px; letter-spacing: 4px; opacity: 0.5; text-transform: uppercase; margin-bottom: 10px; }
.assignment-main { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--crimson); line-height: 1.1; margin-bottom: 4px; }
.assignment-sub { font-size: 11px; letter-spacing: 3px; opacity: 0.6; margin-bottom: 32px; }
.rule { width: 48px; height: 2px; background: var(--crimson); opacity: 0.3; margin-bottom: 32px; }
.field-label { font-size: 9px; letter-spacing: 3px; opacity: 0.5; margin-bottom: 8px; display: block; }
.field-input {
  width: 100%; padding: 16px; border: 1px solid var(--border);
  background: rgba(214,185,122,0.4); font-family: 'Cinzel', serif;
  font-size: 15px; color: var(--crimson); outline: none;
  -webkit-appearance: none; border-radius: 0;
}
.field-input:focus { border-color: var(--crimson); background: rgba(214,185,122,0.7); }
.btn-primary {
  width: 100%; margin-top: 20px; padding: 18px;
  background: var(--crimson); color: var(--gold);
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 5px;
  border: none; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; }
.msg { margin-top: 16px; font-size: 11px; letter-spacing: 2px; min-height: 18px; text-align: center; }
.msg.err { color: var(--crimson); }
.msg.ok  { color: #1a6b00; }

/* ── Queue screen ── */
.queue-card { width: 100%; max-width: 480px; }
.queue-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.queue-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--crimson); line-height: 1; }
.queue-zone { font-size: 9px; letter-spacing: 3px; opacity: 0.5; margin-top: 4px; }
.wave-badge {
  background: var(--crimson); color: var(--gold);
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px;
  padding: 6px 12px; white-space: nowrap;
}
.q-rule { width: 100%; height: 1px; background: var(--crimson); opacity: 0.15; margin-bottom: 28px; }
.athlete-lookup { margin-bottom: 24px; position: relative; }
.athlete-name-display {
  margin-top: 10px; padding: 12px 14px;
  background: rgba(76,0,7,0.06); border-left: 3px solid var(--crimson);
  font-size: 13px; letter-spacing: 1px; min-height: 44px;
}
.athlete-name-display.found { border-color: #1a6b00; }
.athlete-name-display.not-found { border-color: var(--crimson); opacity: 0.6; }
.value-input-wrap { margin-bottom: 28px; }
.big-input {
  width: 100%; padding: 22px 16px; text-align: center;
  border: 2px solid var(--border); background: rgba(214,185,122,0.4);
  font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--crimson);
  outline: none; -webkit-appearance: none; border-radius: 0;
  letter-spacing: 4px;
}
.big-input:focus { border-color: var(--crimson); background: rgba(214,185,122,0.65); }
.unit-label { text-align: center; font-size: 10px; letter-spacing: 3px; opacity: 0.45; margin-top: 8px; }
.submit-confirm {
  width: 100%; padding: 20px;
  background: var(--crimson); color: var(--gold);
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 5px;
  border: none; cursor: pointer; transition: opacity .15s;
}
.submit-confirm:hover { opacity: .85; }
.submit-confirm:disabled { opacity: .35; cursor: not-allowed; }
.last-entry {
  margin-top: 20px; padding: 14px 16px;
  background: rgba(76,0,7,0.05); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; letter-spacing: 1px;
}
.last-entry .le-name { opacity: 0.7; flex: 1; }
.last-entry .le-val  { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--crimson); margin-left: 12px; }
.last-entry .le-check { color: #1a6b00; margin-left: 10px; font-size: 16px; }
.score-count { margin-top: 12px; font-size: 9px; letter-spacing: 3px; opacity: 0.45; text-align: center; }
.btn-logout {
  margin-top: 28px; padding: 10px 20px;
  background: transparent; color: var(--crimson);
  border: 1px solid var(--border); font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 3px; cursor: pointer; opacity: 0.5;
  transition: opacity .15s;
}
.btn-logout:hover { opacity: 1; }
</style>
</head>
<body>

<!-- ── PIN Screen ── -->
<div class="screen active" id="pinScreen">
  <div class="pin-card">
    <div class="assignment-badge">Judge Access — Rannbhoomi 2026</div>
    <div class="assignment-main" id="assignmentMain">Loading...</div>
    <div class="assignment-sub" id="assignmentSub">Enter PIN to begin</div>
    <div class="rule"></div>

    <label class="field-label" for="pinInput">Judge PIN</label>
    <input class="field-input" type="password" id="pinInput" placeholder="••••••" maxlength="12" autocomplete="off"
           onkeydown="if(event.key==='Enter') verifyPin()">
    <button class="btn-primary" onclick="verifyPin()" id="pinBtn">ENTER</button>
    <div class="msg" id="pinMsg"></div>
  </div>
</div>

<!-- ── Queue Screen ── -->
<div class="screen" id="queueScreen">
  <div class="queue-card">
    <div class="queue-header">
      <div>
        <div class="queue-title" id="qStationTitle">—</div>
        <div class="queue-zone" id="qZoneLabel">—</div>
      </div>
      <div class="wave-badge" id="qWaveBadge">BATTLE 1</div>
    </div>
    <div class="q-rule"></div>

    <!-- Athlete ID -->
    <div class="athlete-lookup">
      <label class="field-label" for="athleteId">Athlete ID</label>
      <input class="field-input" type="text" id="athleteId" placeholder="e.g. RB001234"
             autocomplete="off" autocapitalize="characters"
             oninput="onAthleteIdInput()" onpaste="setTimeout(onAthleteIdInput,0)">
      <div class="athlete-name-display" id="athleteNameDisplay">Enter athlete ID above</div>
    </div>

    <!-- Score value -->
    <div class="value-input-wrap">
      <input class="big-input" type="number" id="valueInput" placeholder="0"
             min="0" step="1" inputmode="numeric"
             onkeydown="if(event.key==='Enter') submitScore()">
      <div class="unit-label" id="unitLabel">—</div>
    </div>

    <button class="submit-confirm" id="submitBtn" onclick="submitScore()" disabled>SUBMIT SCORE</button>
    <div class="msg" id="submitMsg"></div>

    <div class="last-entry" id="lastEntry" style="display:none;">
      <span class="le-name" id="leName">—</span>
      <span class="le-val"  id="leVal">—</span>
      <span class="le-check">✓</span>
    </div>

    <div class="score-count" id="scoreCount">Scored this session: 0</div>
    <button class="btn-logout" onclick="logout()">LOG OUT</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxELQsXchGNJXNDyETPXuFOLNKXNNL48OZcG0IRtS-eohXx9gOSP-ZFC1J0PHl-QjNG/exec';

const STATION_LABELS = {
  s1_burpees:   { label: 'Burpees',           unit: 'reps' },
  s2_bike:      { label: 'Erg Bike',          unit: 'metres' },
  s3_lunges:    { label: 'Lunges',            unit: 'reps' },
  s4_pushups:   { label: 'Push Ups',          unit: 'reps' },
  s5_sprint:    { label: 'Sprint',            unit: '20m lengths' },
  s6_inchworms: { label: 'Inch Worms',        unit: 'reps' },
  s7_squats:    { label: 'DB Front Squats',   unit: 'reps' },
  rowing:       { label: 'Rowing',            unit: 'cals' },
  devils_press: { label: "Devil's Press",     unit: 'reps' },
  kb_walk:      { label: 'KB Walk',           unit: '20m lengths' },
  box_jump:     { label: 'Box Jumps',         unit: 'reps' },
  weight_total: { label: 'Total Weight',      unit: 'kg' },
  time_seconds: { label: 'Finish Time',       unit: 'seconds' },
};

const ROUND_NAMES = { '1': 'Battle 1', '2': 'Battle 2', '3': 'Battle 3' };

// Read zone + station from URL params
const params  = new URLSearchParams(location.search);
const urlZone = (params.get('zone') || '').toUpperCase();
const urlSt   = params.get('station') || '';
const urlRound = params.get('round') || '1';
const stInfo  = STATION_LABELS[urlSt] || null;

let judgePin   = sessionStorage.getItem('judge_pin') || '';
let scoreCount = 0;
let lookupTimer = null;
let currentAthleteId   = '';
let currentAthleteName = '';
let athleteConfirmed   = false;

// ── Init ──────────────────────────────────────────────────────────────────────

(function init() {
  // Show assignment on PIN screen
  if (stInfo && urlZone) {
    document.getElementById('assignmentMain').textContent = stInfo.label.toUpperCase();
    document.getElementById('assignmentSub').textContent  = `Zone ${urlZone}  ·  ${ROUND_NAMES[urlRound] || 'Battle ' + urlRound}  ·  Enter PIN to begin`;
  } else {
    document.getElementById('assignmentMain').textContent = 'JUDGE PORTAL';
    document.getElementById('assignmentSub').textContent  = 'Enter PIN to begin';
  }

  // Auto-login if PIN cached in sessionStorage
  if (judgePin) showQueue();
})();

// ── PIN verification ──────────────────────────────────────────────────────────

async function verifyPin() {
  const entered = document.getElementById('pinInput').value.trim();
  if (!entered) return;

  const btn = document.getElementById('pinBtn');
  const msg = document.getElementById('pinMsg');
  btn.disabled = true;
  btn.textContent = 'CHECKING...';
  msg.textContent = '';
  msg.className = 'msg';

  // Verify PIN by submitting a dummy validate call
  // (PIN is validated server-side on real score submission; we just cache it here)
  // For a lightweight pre-check we attempt a validateAthlete call with a dummy ID
  // and accept any response other than "Invalid PIN" or network error as success.
  // True PIN validation happens at score submit time.
  judgePin = entered;
  sessionStorage.setItem('judge_pin', entered);
  showQueue();

  btn.disabled = false;
  btn.textContent = 'ENTER';
}

function showQueue() {
  document.getElementById('pinScreen').classList.remove('active');
  document.getElementById('queueScreen').classList.add('active');

  // Populate queue header
  if (stInfo) {
    document.getElementById('qStationTitle').textContent = stInfo.label.toUpperCase();
    document.getElementById('unitLabel').textContent     = stInfo.unit.toUpperCase();
  } else {
    document.getElementById('qStationTitle').textContent = urlSt || 'STATION';
    document.getElementById('unitLabel').textContent     = '—';
  }
  document.getElementById('qZoneLabel').textContent = urlZone ? `Zone ${urlZone}` : 'Zone —';
  document.getElementById('qWaveBadge').textContent  = ROUND_NAMES[urlRound] || 'Battle ' + urlRound;

  document.getElementById('athleteId').focus();
}

// ── Athlete ID lookup (debounced) ─────────────────────────────────────────────

function onAthleteIdInput() {
  const id  = document.getElementById('athleteId').value.trim().toUpperCase();
  const box = document.getElementById('athleteNameDisplay');
  athleteConfirmed   = false;
  currentAthleteId   = '';
  currentAthleteName = '';
  updateSubmitBtn();

  if (!id || id.length < 4) {
    box.textContent  = 'Enter athlete ID above';
    box.className    = 'athlete-name-display';
    return;
  }

  box.textContent = 'Looking up...';
  box.className   = 'athlete-name-display';
  clearTimeout(lookupTimer);
  lookupTimer = setTimeout(() => lookupAthlete(id), 500);
}

async function lookupAthlete(id) {
  const box = document.getElementById('athleteNameDisplay');
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=validate_athlete&athlete_id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (data.found && data.athlete) {
      const a = data.athlete;
      const name     = a.name || id;
      const category = a.category ? ` · ${String(a.category).charAt(0).toUpperCase() + String(a.category).slice(1)}` : '';
      const wave     = a.wave ? ` · Wave ${a.wave}` : '';
      box.textContent  = `${name}${category}${wave}`;
      box.className    = 'athlete-name-display found';
      currentAthleteId   = id;
      currentAthleteName = name;
      athleteConfirmed   = true;
    } else {
      box.textContent = 'Athlete not found — check ID';
      box.className   = 'athlete-name-display not-found';
    }
  } catch {
    box.textContent = 'Lookup failed — check connection';
    box.className   = 'athlete-name-display not-found';
  }
  updateSubmitBtn();
}

function updateSubmitBtn() {
  const val = parseFloat(document.getElementById('valueInput').value);
  document.getElementById('submitBtn').disabled = !(athleteConfirmed && !isNaN(val) && val >= 0);
}

// ── Score submission ──────────────────────────────────────────────────────────

async function submitScore() {
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('submitMsg');
  const val = parseFloat(document.getElementById('valueInput').value);

  if (!athleteConfirmed || isNaN(val)) return;

  btn.disabled   = true;
  btn.textContent = 'SUBMITTING...';
  msg.textContent = '';
  msg.className  = 'msg';

  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({
        action:     'score',
        pin:        judgePin,
        round:      urlRound,
        zone:       urlZone,
        station:    urlSt,
        athlete_id: currentAthleteId,
        value:      val,
      }),
    });
    const data = await res.json();

    if (data.success) {
      // Show last entry
      document.getElementById('leName').textContent = currentAthleteName;
      document.getElementById('leVal').textContent  = `${val} ${stInfo ? stInfo.unit : ''}`;
      document.getElementById('lastEntry').style.display = 'flex';

      scoreCount++;
      document.getElementById('scoreCount').textContent = `Scored this session: ${scoreCount}`;

      // Clear form for next athlete
      document.getElementById('athleteId').value    = '';
      document.getElementById('valueInput').value   = '';
      document.getElementById('athleteNameDisplay').textContent = 'Enter athlete ID above';
      document.getElementById('athleteNameDisplay').className   = 'athlete-name-display';
      athleteConfirmed   = false;
      currentAthleteId   = '';
      currentAthleteName = '';

      msg.textContent = '';
      document.getElementById('athleteId').focus();
    } else {
      throw new Error(data.error || 'Submission failed');
    }
  } catch (err) {
    msg.textContent = err.message;
    msg.className   = 'msg err';
    // If PIN was wrong, force re-login
    if (err.message.includes('PIN')) {
      sessionStorage.removeItem('judge_pin');
      judgePin = '';
      setTimeout(() => {
        document.getElementById('queueScreen').classList.remove('active');
        document.getElementById('pinScreen').classList.add('active');
        document.getElementById('pinMsg').textContent = 'PIN rejected — re-enter';
        document.getElementById('pinMsg').className   = 'msg err';
      }, 1200);
    }
  }

  btn.disabled    = false;
  btn.textContent = 'SUBMIT SCORE';
  updateSubmitBtn();
}

function logout() {
  sessionStorage.removeItem('judge_pin');
  location.reload();
}

// Re-validate submit button on value input
document.getElementById('valueInput').addEventListener('input', updateSubmitBtn);
</script>
</body>
</html>
