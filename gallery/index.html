<link rel="stylesheet" href="../css/style.css">
<style>
/* ── Nav overrides (parchment bg, maroon text) ── */
nav { background:#d6b97a !important; border-bottom:1.5px solid rgba(76,0,7,0.18) !important; }
.nav-logo .nav-rb-logo { display:block; width:160px; height:44px; object-fit:cover; object-position:center 45%; align-self:center; }
.nav-links a { color:#4c0007 !important; }
.nav-links a:hover { color:#4c0007 !important; background:rgba(76,0,7,0.08) !important; }
.nav-links a.nav-cta { background:#4c0007 !important; color:#d6b97a !important; }
.nav-links a.nav-cta:hover { background:rgba(76,0,7,0.82) !important; color:#d6b97a !important; }
.hamburger span { background:#4c0007 !important; }
.nav-submenu { background:#d6b97a !important; border-color:rgba(76,0,7,0.2) !important; }
.nav-submenu li a { color:#4c0007 !important; border-bottom-color:rgba(76,0,7,0.1) !important; }
.nav-submenu li a:hover { background:#4c0007 !important; color:#dec189 !important; }

:root { --crimson:#4c0007; --gold:#dec189; --parchment:#d6b97a; --border:rgba(76,0,7,0.22); }
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#d6b97a; font-family:'Cinzel',serif; color:var(--crimson); padding:90px 5vw 80px; }

/* ── Page header ── */
.page-label { font-size:14px; letter-spacing:6px; display:block; margin-bottom:12px; }
.page-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,96px); letter-spacing:4px; color:var(--crimson); line-height:1; }
.page-rule  { width:64px; height:2px; background:var(--crimson); opacity:.3; margin:18px 0 40px; }

/* ── Media grid (photos + videos unified) ── */
.media-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
@media(max-width:700px) { .media-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:420px) { .media-grid { grid-template-columns:1fr; } }

/* Photo items — portrait */
.photo-item {
  border:1px solid var(--border); overflow:hidden;
  cursor:pointer; display:block; position:relative;
}
.photo-item img { width:100%; height:100%; object-fit:cover; aspect-ratio:3/4; display:block; transition:transform .28s ease; }
.photo-item:hover img { transform:scale(1.04); }
.photo-hover {
  position:absolute; inset:0; background:rgba(76,0,7,0);
  display:flex; align-items:flex-end; padding:14px;
  transition:background .22s;
}
.photo-item:hover .photo-hover { background:rgba(76,0,7,0.38); }
.photo-caption {
  font-size:9px; letter-spacing:2px; color:var(--gold);
  opacity:0; transition:opacity .22s; text-transform:uppercase; line-height:1.4;
}
.photo-item:hover .photo-caption { opacity:1; }

/* Video items — landscape, span 2 cols */
.video-item {
  grid-column: span 2;
  border:1px solid var(--border); overflow:hidden; background:rgba(214,185,122,0.3);
}
@media(max-width:700px) { .video-item { grid-column: span 2; } }
@media(max-width:420px) { .video-item { grid-column: span 1; } }
.video-item iframe { display:block; width:100%; aspect-ratio:16/9; border:none; }
.video-label { padding:10px 14px; font-size:12px; letter-spacing:2.5px; }

/* ── Lightbox ── */

.lightbox {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(76,0,7,0.94); align-items:center; justify-content:center;
  padding:20px;
}
.lightbox.open { display:flex; }
.lb-inner { position:relative; display:flex; flex-direction:column; align-items:center; }
.lb-img { max-width:min(90vw,1200px); max-height:82vh; object-fit:contain; display:block; border:1px solid rgba(222,193,137,0.2); }
.lb-close {
  position:absolute; top:-42px; right:0;
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px;
  color:var(--gold); cursor:pointer; opacity:.65; border:none; background:none;
  padding:4px 0;
}
.lb-close:hover { opacity:1; }
.lb-caption {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px;
  color:var(--gold); opacity:.55; margin-top:14px; text-align:center;
}
.lb-nav {
  position:fixed; top:50%; transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold);
  cursor:pointer; background:none; border:none; opacity:.5; padding:16px 20px;
  transition:opacity .15s;
}
.lb-nav:hover { opacity:1; }
.lb-prev { left:0; }
.lb-next { right:0; }
.lb-counter {
  position:absolute; top:-42px; left:0;
  font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px;
  color:var(--gold); opacity:.4;
}

/* ── Empty state ── */
.empty-note { font-size:17px; letter-spacing:1.5px; padding:40px 0; font-family:Georgia,serif; line-height:1.7; text-align:center; }

@media(max-width:540px) {
  body { padding:32px 4vw 60px; }
  .lb-nav { font-size:24px; padding:12px 10px; }
}
</style>
</head>
<body>

<nav id="navbar">
  <a class="nav-logo" href="../index.html">
    <img src="../images/RB Logo.png" alt="Rannbhoomi" class="nav-rb-logo">
  </a>
  <ul class="nav-links">
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#stations">Stations</a></li>
    <li><a href="../index.html#rules">Rules</a></li>
    <li class="nav-dropdown">
      <a href="../index.html#venue" class="nav-dropdown-toggle">Season 1 &#9660;</a>
      <ul class="nav-submenu">
        <li><a href="../index.html#venue">Pune — 2 Aug '26</a></li>

      </ul>
    </li>
    <li><a href="../index.html#faq">FAQ</a></li>

  </ul>
  <div class="hamburger" onclick="toggleNav(this)">
    <span></span><span></span><span></span>
  </div>
</nav>

<span class="page-label">RANNBHOOMI 2026</span>
<h1 class="page-title">GALLERY</h1>
<div class="page-rule"></div>

<div class="media-grid" id="mediaGrid"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="handleLbClick(event)">
  <div class="lb-inner">
    <span class="lb-counter" id="lbCounter"></span>
    <button class="lb-close" onclick="closeLightbox()">&#10005; CLOSE</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-caption" id="lbCaption"></div>
  </div>
  <button class="lb-nav lb-prev" onclick="stepLightbox(-1,event)">&#8592;</button>
  <button class="lb-nav lb-next" onclick="stepLightbox(1,event)">&#8594;</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  MEDIA — unified photos + videos in display order
//  Photo:  { type:'photo', src:'...', caption:'...' }
//  Video:  { type:'video', id:'YOUTUBE_VIDEO_ID', label:'...' }
//  Videos span 2 columns automatically.
// ─────────────────────────────────────────────────────────────────────────────
const MEDIA = [
  { type:'photo', src:'Website%20gallery/Website%20gallery/Battle1_V.png',        caption:'Battle 1 — Qualifiers'   },
  { type:'photo', src:'Website%20gallery/Website%20gallery/Battle2_Neha.png',     caption:'Battle 2 — Semi-Finals'  },
  { type:'photo', src:'Website%20gallery/Website%20gallery/Final_battle_shu.png', caption:'Battle 3 — Finals'       },
  // Add videos here when you have YouTube IDs:
  // { type:'video', id:'YOUTUBE_VIDEO_ID', label:'Rannbhoomi 2026 — Event Promo' },
  { type:'photo', src:'Website%20gallery/Website%20gallery/All%203%20Pull%20over%20RB.png', caption:'All Three — Pull-overs' },
  { type:'photo', src:'Website%20gallery/Website%20gallery/RB%20Post-07.jpg',     caption:'Rannbhoomi 2026'         },
  { type:'photo', src:'Website%20gallery/Website%20gallery/RB%20Post-08.jpg',     caption:'Rannbhoomi 2026'         },
  { type:'photo', src:'Website%20gallery/Website%20gallery/RB%20Post-09.jpg',     caption:'Rannbhoomi 2026'         },
];

// Photos only — used for lightbox navigation (videos not included)
const photos = MEDIA.filter(m => m.type === 'photo');
let lbIdx = 0;

// ─────────────────────────────────────────────────────────────────────────────
//  Build unified media grid
// ─────────────────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '';
  let photoIdx = 0;

  MEDIA.forEach(item => {
    if (item.type === 'photo') {
      const i = photoIdx++;
      const div = document.createElement('div');
      div.className = 'photo-item';
      div.setAttribute('role', 'button');
      div.setAttribute('aria-label', item.caption);
      div.setAttribute('tabindex', '0');
      div.innerHTML = `
        <img src="${item.src}" alt="${item.caption}" loading="lazy">
        <div class="photo-hover">
          <span class="photo-caption">${item.caption}</span>
        </div>`;
      div.onclick = () => openLightbox(i);
      div.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') openLightbox(i); };
      grid.appendChild(div);
    } else if (item.type === 'video') {
      const div = document.createElement('div');
      div.className = 'video-item';
      div.innerHTML = `
        <iframe src="https://www.youtube.com/embed/${item.id}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen loading="lazy"></iframe>
        <div class="video-label">${item.label}</div>`;
      grid.appendChild(div);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  Lightbox
// ─────────────────────────────────────────────────────────────────────────────
function openLightbox(i) {
  lbIdx = i;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLightbox() {
  const p = photos[lbIdx];
  document.getElementById('lbImg').src       = p.src;
  document.getElementById('lbImg').alt       = p.caption;
  document.getElementById('lbCaption').textContent = p.caption;
  document.getElementById('lbCounter').textContent = `${lbIdx + 1} / ${photos.length}`;
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function handleLbClick(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function stepLightbox(dir, e) {
  if (e) e.stopPropagation();
  lbIdx = (lbIdx + dir + photos.length) % photos.length;
  renderLightbox();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'l') stepLightbox(1, null);
  if (e.key === 'ArrowLeft'  || e.key === 'h') stepLightbox(-1, null);
  if (e.key === 'Escape')                       closeLightbox();
});

buildGrid();
</script>
<script src="../js/main.js"></script>
</body>
</html>
